name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the Repository
    - name: Checkout the Repository
      uses: actions/checkout@v3

    # Step 2: Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Step 3: Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 4: Read the Current Version Number
    - name: Read the Current Version Number
      id: read-version
      run: |
        VERSION=$(cat version.txt)
        echo "VERSION=${VERSION}" >> $GITHUB_ENV

    # Step 5: Increment the Version Number
    - name: Increment the Version Number
      id: increment-version
      run: |
        VERSION=${{ env.VERSION }}
        read -r vn <<< "$VERSION"
        vn=$(echo "$vn + 0.1" | bc)
        NEW_VERSION="${vn}"
        echo "${NEW_VERSION}" > version.txt
        echo "VERSION=${NEW_VERSION}" >> $GITHUB_ENV

    # Step 6: Build Docker Images
    - name: Build Docker Image1
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/optalpha-broker-server:broker-test-${{ env.VERSION }} -f Dockerfile_test .
    - name: Build Docker Image2
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/optalpha-broker-server:broker-api-${{ env.VERSION }} -f Dockerfile_prod .

    # Optional Step 7: Verify the Docker Images (Optional but recommended)
    - name: Verify Docker Image1
      run: docker run --rm ${{ secrets.DOCKER_USERNAME }}/optalpha-broker-server:broker-test-${{ env.VERSION }} python --version
    - name: Verify Docker Image2
      run: docker run --rm ${{ secrets.DOCKER_USERNAME }}/optalpha-broker-server:broker-api-${{ env.VERSION }} python --version

    # Step 8: Push Docker Images to Docker Hub 
    - name: Push Docker Image1
      run: docker push ${{ secrets.DOCKER_USERNAME }}/optalpha-broker-server:broker-test-${{ env.VERSION }}
    - name: Push Docker Image2
      run: docker push ${{ secrets.DOCKER_USERNAME }}/optalpha-broker-server:broker-api-${{ env.VERSION }}

    # Step 9: Commit the updated version number
    - name: Commit version number
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add version.txt
        git commit -m "Update version number to ${{ env.VERSION }}"
        git push
